<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムアニメーションなどのためのスタイル */
        body {
            background-color: #f3f4f6; /* 薄いグレー */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        /* カスタムメッセージボックスのスタイル（ブラウザのalertの代わり） */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 300px;
            text-align: center;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="text-4xl md:text-6xl font-bold text-gray-800 mb-8">
            心理学実験室へようこそ
        </h1>
        
        <button 
            id="start-btn"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg"
        >
            実験を開始する
        </button>
    </div>

    <!-- カスタムアラートUI -->
    <div id="overlay"></div>
    <div id="custom-alert">
        <p id="alert-message" class="text-xl mb-6 text-gray-700"></p>
        <button 
            onclick="closeAlert()"
            class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-6 rounded-lg transition-colors"
        >
            閉じる
        </button>
    </div>

    <script>
        // ボタン要素の取得
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const customAlert = document.getElementById('custom-alert');
        const alertMessage = document.getElementById('alert-message');

        // メッセージを表示する関数
        function showAlert(message) {
            alertMessage.textContent = message;
            overlay.style.display = 'block';
            customAlert.style.display = 'block';
        }

        // メッセージを閉じる関数
        function closeAlert() {
            overlay.style.display = 'none';
            customAlert.style.display = 'none';
        }

        // イベントリスナーの設定
        startBtn.addEventListener('click', () => {
            // 指示通り「Hello World!」を表示
            showAlert('Hello World!');
        });

        // オーバーレイクリックで閉じる
        overlay.addEventListener('click', closeAlert);
    </script>
</body>
</html>
