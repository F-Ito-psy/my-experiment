<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - ストループ課題 (表示修正版)</title>
    <!-- jsPsych 7.3系のコアライブラリ -->
    <script src="https://unpkg.com/jspsych@7.3.4/dist/index.browser.js"></script>
    <!-- 各種プラグイン (scoped packages) -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0/dist/index.browser.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
    
    <style>
        body {
            background-color: #FFFFFF; /* 背景色: 白 */
            color: #333333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* スクロールバーを隠す */
        }
        
        /* 実験コンテンツのコンテナ設定 */
        #jspsych-target {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 教示画面のテキスト */
        .instruction-text {
            font-size: 24px;
            line-height: 1.6;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 刺激（文字）のテキスト：表示切れを防ぐための設定 */
        .stimulus-text {
            font-size: 80px; /* 少し大きく調整 */
            font-weight: bold;
            line-height: 1.2; /* 行の高さを確保して上下の欠けを防ぐ */
            display: inline-block;
            vertical-align: middle;
        }

        /* jsPsychのボタンデザイン */
        .jspsych-btn {
            font-size: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- jsPsychが表示されるターゲット要素 -->
    <div id="jspsych-target"></div>

    <script>
        const jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // 実験終了時にデータをCSV形式で表示
                jsPsych.data.displayData('csv');
            }
        });

        // 文字(text)と色(color)の定義
        const colors = [
            { name: "赤", value: "red", key: "r" },
            { name: "青", value: "blue", key: "b" },
            { name: "緑", value: "green", key: "g" }
        ];

        // 全ての組み合わせ（3×3 = 9種類）を生成
        let stroop_stimuli = [];
        colors.forEach(textObj => {
            colors.forEach(colorObj => {
                stroop_stimuli.push({
                    text: textObj.name,
                    color: colorObj.value,
                    condition: textObj.name === colorObj.name ? "congruent" : "incongruent",
                    correct_key: colorObj.key
                });
            });
        });

        // 10試行をランダムに抽出
        const trials_to_run = jsPsych.randomization.sampleWithReplacement(stroop_stimuli, 10);

        let timeline = [];

        // 1. 開始ボタン画面
        const start_trial = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<div class="instruction-text"><p>ストループ課題を開始します</p></div>',
            choices: ['実験を開始する'],
            post_trial_gap: 500
        };
        timeline.push(start_trial);

        // 2. 教示画面
        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction-text">
                    <p>文字の「色」をできるだけ早く正確に答えてください。</p>
                    <p>赤色の文字なら <span style="color:red; font-weight:bold;">'r'</span></p>
                    <p>青色の文字なら <span style="color:blue; font-weight:bold;">'b'</span></p>
                    <p>緑色の文字なら <span style="color:green; font-weight:bold;">'g'</span></p>
                    <br>
                    <p>準備ができたら「スペースキー」を押して開始します。</p>
                </div>
            `,
            choices: [' ']
        };
        timeline.push(instructions);

        trials_to_run.forEach((stim) => {
            
            // a. 注視点 (+) 500ms
            const fixation = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div class="stimulus-text">+</div>',
                choices: "NO_KEYS",
                trial_duration: 500
            };
            timeline.push(fixation);

            // b. 刺激提示
            const stroop_trial = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `<div class="stimulus-text" style="color: ${stim.color};">${stim.text}</div>`,
                choices: ['r', 'b', 'g'],
                data: {
                    phase: 'test',
                    text_content: stim.text,
                    font_color: stim.color,
                    condition: stim.condition,
                    correct_response: stim.correct_key
                },
                on_finish: function(data) {
                    // 正誤判定の記録
                    data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
                }
            };
            timeline.push(stroop_trial);

            // c. 試行間隔 (ITI) 1000ms
            const iti = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '',
                choices: "NO_KEYS",
                trial_duration: 1000
            };
            timeline.push(iti);
        });

        window.onload = function() {
            jsPsych.run(timeline);
        };
    </script>
</body>
</html>
