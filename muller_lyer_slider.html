<body>

  <div id="jspsych-target"></div>

  <script>
    // 安全対策：プラグインが正常にCDNから読み込めているか検証します
    const HtmlKeyboardResponse = window.jsPsychHtmlKeyboardResponse;
    const CanvasSliderResponse = window.jsPsychCanvasSliderResponse;
    const SurveyText = window.jsPsychSurveyText;

    if (!HtmlKeyboardResponse || !CanvasSliderResponse || !SurveyText) {
      document.getElementById('jspsych-target').innerHTML = `
        <div class="experiment-container" style="border: 2px solid #feb2b2; background-color: #fff5f5;">
          <h1 style="color: #c53030;">エラー: ライブラリの読み込みに失敗しました</h1>
          <p class="center-text" style="color: #9b2c2c;">
            jsPsychプラグインのダウンロードに失敗した可能性があります。<br>
            インターネット接続を確認し、ページをリロード（再読み込み）してください。
          </p>
        </div>
      `;
      throw new Error("jsPsych plugins failed to load.");
    }

    // 参加者IDを記録する変数
    let subject_id = "unknown";

    // jsPsychの初期化
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target',
      on_finish: function() {
        // 実験終了時にデータを整理して表示、およびGASへの送信処理
        showResults();
      }
    });

    // 独立変数の定義
    // 角度（15度、75度）、羽の長さ（20px、50px）
    const factors = {
      angle: [15, 75],
      feather_length: [20, 50]
    };

    // 4条件を各3回 = 12試行を生成
    let trials_design = [];
    const repetitions = 3;

    for (let r = 0; r < repetitions; r++) {
      for (let a of factors.angle) {
        for (let f of factors.feather_length) {
          trials_design.push({
            angle: a,
            feather_length: f
          });
        }
      }
    }

    // 試行をシャッフル
    trials_design = jsPsych.randomization.shuffle(trials_design);

    // タイムラインの初期化
    const timeline = [];

    // --- 0. 参加者ID入力画面 ---
    const participant_info = {
      type: SurveyText,
      questions: [
        {
          prompt: '<strong>参加者ID</strong>を入力してください（例: sub01）：',
          placeholder: '任意の半角英数字を入力してください',
          required: true,
          name: 'subject_id'
        }
      ],
      button_label: '次へ進む',
      on_finish: function(data) {
        // 入力されたIDを変数に格納
        subject_id = data.response.subject_id.trim() || "unknown";
      }
    };
    timeline.push(participant_info);

    // --- 1. 教示画面 ---
    const instructions = {
      type: HtmlKeyboardResponse,
      stimulus: `
        <div class="experiment-container">
          <h1>ミュラー・リヤー錯視実験</h1>
          <p>
            この実験では、視覚的な錯視の大きさを調整法を用いて測定します。<br><br>
            画面上に、上下に並んだ2本の線（矢印のような羽がついた図形）が表示されます。<br><br>
            <strong>・上の線：</strong> 長さが固定されている基準 of 線（内向きの羽）です。<br>
            <strong>・下の線：</strong> スライダーを動かすことで長さを自由に変化させられる比較用の線（外向きの羽）です。<br><br>
            画面下部のスライダーをドラッグして、<strong>「下の線」の長さが「上の線」と同じ長さに見えるように</strong>調整してください。<br>
            調整が完了したら、スライダーの下にある「決定」ボタンを押して次の試行に進んでください。<br><br>
            試行は全部で <strong>12回</strong> あります。
          </p>
          <button class="jspsych-btn" id="start-btn">実験を始める</button>
        </div>
      `,
      choices: ["NO_KEYS"], // キー入力を無効化
      on_load: function() {
        // ボタンクリックで次の画面へ
        document.getElementById('start-btn').addEventListener('click', function() {
          jsPsych.finishTrial();
        });
      }
    };
    timeline.push(instructions);

    // --- 共通描画関数 ---
    // 初期描画時とスライダー変更時のリアルタイム更新をこの関数で行う
    function drawMullerLyer(canvas, comparisonLength, trial_config) {
      const ctx = canvas.getContext('2d');
      if (!ctx) return;
      
      // キャンバスをクリア
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 描画パラメータ設定
      const centerX = canvas.width / 2;
      const standardY = 120; // 上半分の標準刺激のY座標
      const comparisonY = 280; // 下半分の比較刺激のY座標
      
      const standardLength = 200; // 標準刺激は200px固定
      const angleRad = (trial_config.angle * Math.PI) / 180;
      const fLength = trial_config.feather_length;

      // --- 上半分：標準刺激（内向き羽 ＞ーーー＜） ---
      const stdStartX = centerX - (standardLength / 2);
      const stdEndX = centerX + (standardLength / 2);

      // 主線
      ctx.beginPath();
      ctx.moveTo(stdStartX, standardY);
      ctx.lineTo(stdEndX, standardY);
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#2d3748';
      ctx.stroke();

      // 左側の内向き羽 (＞)
      ctx.beginPath();
      ctx.moveTo(stdStartX + fLength * Math.cos(angleRad), standardY - fLength * Math.sin(angleRad));
      ctx.lineTo(stdStartX, standardY);
      ctx.lineTo(stdStartX + fLength * Math.cos(angleRad), standardY + fLength * Math.sin(angleRad));
      ctx.stroke();

      // 右側の内向き羽 (＜)
      ctx.beginPath();
      ctx.moveTo(stdEndX - fLength * Math.cos(angleRad), standardY - fLength * Math.sin(angleRad));
      ctx.lineTo(stdEndX, standardY);
      ctx.lineTo(stdEndX - fLength * Math.cos(angleRad), standardY + fLength * Math.sin(angleRad));
      ctx.stroke();


      // --- 下半分：比較刺激（外向き羽 ＜ーーー＞） ---
      const compStartX = centerX - (comparisonLength / 2);
      const compEndX = centerX + (comparisonLength / 2);

      // 主線
      ctx.beginPath();
      ctx.moveTo(compStartX, comparisonY);
      ctx.lineTo(compEndX, comparisonY);
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#2d3748';
      ctx.stroke();

      // 左側の外向き羽 (＜)
      ctx.beginPath();
      ctx.moveTo(compStartX - fLength * Math.cos(angleRad), comparisonY - fLength * Math.sin(angleRad));
      ctx.lineTo(compStartX, comparisonY);
      ctx.lineTo(compStartX - fLength * Math.cos(angleRad), comparisonY + fLength * Math.sin(angleRad));
      ctx.stroke();

      // 右側の外向き羽 (＞)
      ctx.beginPath();
      ctx.moveTo(compEndX + fLength * Math.cos(angleRad), comparisonY - fLength * Math.sin(angleRad));
      ctx.lineTo(compEndX, comparisonY);
      ctx.lineTo(compEndX + fLength * Math.cos(angleRad), comparisonY + fLength * Math.sin(angleRad));
      ctx.stroke();
    }

    // --- 2. 実験試行ループ ---
    const total_trials = trials_design.length;

    trials_design.forEach((trial_config, index) => {
      
      // スライダー初期値（100px 〜 300px の間で試行ごとにランダムに決定）
      const initial_value = Math.floor(Math.random() * (300 - 100 + 1)) + 100;

      const trial = {
        type: CanvasSliderResponse,
        stimulus: function(c, slider_value) {
          // ハイブリッド描画対応：
          // プラグインによる自動の再描画コールバックが生じた場合は slider_value を、
          // 初回描画時などで値がない場合は initial_value を使用して描画します。
          const current_val = (typeof slider_value !== 'undefined' && slider_value !== null && !isNaN(slider_value)) 
            ? parseFloat(slider_value) 
            : initial_value;
          
          drawMullerLyer(c, current_val, trial_config);
        },
        canvas_size: [400, 600], // [高さ, 幅]
        min: 50,
        max: 350,
        slider_start: initial_value,
        step: 1,
        labels: [], // 数値によるバイアスを防ぐため、スライダー両端の数値ラベルを非表示化
        button_label: '決定',
        prompt: `
          <div class="trial-counter">
            Trial ${index + 1} / ${total_trials}
          </div>
          <p class="center-text" style="margin-bottom: 10px;">
            スライダーを調整して、下の線の長さが上の線と同じに見えるようにしてください。
          </p>
        `,
        data: {
          phase: 'experiment',
          trial_index: index + 1,
          angle: trial_config.angle,
          feather_length: trial_config.feather_length,
          standard_length: 200,
          slider_start_val: initial_value
        },
        on_load: function() {
          // 手動イベント登録：プラグインが自動の再描画イベントをサポートしていない環境への対応
          const setupRealtimeUpdate = () => {
            const slider = document.querySelector('#jspsych-canvas-slider-response-response') || document.querySelector('input[type="range"]');
            const canvas = document.querySelector('#jspsych-canvas-specimen') || document.querySelector('canvas');
            
            if (slider && canvas) {
              // スライダー操作時にリアルタイム描画を走らせる
              slider.addEventListener('input', function() {
                const currentVal = parseFloat(slider.value);
                drawMullerLyer(canvas, currentVal, trial_config);
              });
            }
          };
          
          // 即時セットアップ
          setupRealtimeUpdate();
          // iframeや一部の描画タイミングのズレに備え、少し遅れて確実にもう一度バインド
          setTimeout(setupRealtimeUpdate, 50);
        },
        on_finish: function(data) {
          // 参加者が最終的に選択した長さを保存（response がスライダーの最終選択値）
          data.adjusted_length = data.response;
          // 物理的長さ(200px)との誤差（錯視量）を計算
          data.illusion_error = data.response - 200;

          // データ構造定義（追加項目）
          data.subject_id = subject_id;
          data.timestamp = new Date().toISOString();
          data.wing_length = trial_config.feather_length; // 羽の長さ
          data.pse = data.response; // 調整された主観的等価点(adjusted_length)
          data.error_amount = data.response - 200; // 物理的基準値200との差分(illusion_error)
        }
      };

      timeline.push(trial);
    });


    // --- 3. 自動送信 & 結果表示処理 ---
    
    // GASへのデータ送信処理
    function sendDataToGAS(experiment_data) {
      const statusDiv = document.getElementById('upload-status');
      if (!statusDiv) return;

      statusDiv.innerHTML = `
        <div style="background-color: #ebf8ff; border: 1px solid #bee3f8; color: #2b6cb0; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px;">
          ⌛ 反応データを自動送信中です。そのまましばらくお待ちください...
        </div>
      `;

      const gasUrl = 'https://script.google.com/macros/s/AKfycbzNV0ah37pPpB206w0B7bPWVtsJYlzHGLYlb4qQ0Nk6D4Uhtceru84LDg0nVpmk_ZViMg/exec';

      fetch(gasUrl, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'text/plain' // CORS preflightを避けるために標準的なプレーンテキスト形式で送信
        },
        body: JSON.stringify(experiment_data)
      })
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTPエラー (ステータス: ${response.status})`);
        }
        return response.text();
      })
      .then(result => {
        statusDiv.innerHTML = `
          <div style="background-color: #f0fff4; border: 1px solid #c6f6d5; color: #2f855a; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <span>✓</span> データのサーバー保存が正常に完了しました！
          </div>
        `;
      })
      .catch(error => {
        console.error("Transmission failed:", error);
        statusDiv.innerHTML = `
          <div style="background-color: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 20px; box-sizing: border-box;">
            <strong style="display: block; margin-bottom: 5px;">⚠ データの自動送信に失敗しました</strong>
            <span style="font-size: 13px; color: #9b2c2c; display: block; line-height: 1.4;">理由: ネットワークに未接続か、送信先URLで制限が発生している可能性があります。(${error.message})</span>
            <div style="margin-top: 12px; display: flex; gap: 10px;">
              <button class="jspsych-btn" id="retry-btn" style="padding: 6px 15px; font-size: 13px; background-color: #e53e3e; color: white;">再送信を試みる</button>
            </div>
          </div>
        `;
        
        // 再試行ボタンにイベントをバインド
        document.getElementById('retry-btn').addEventListener('click', function() {
          sendDataToGAS(experiment_data);
        });
      });
    }

    function showResults() {
      const all_data = jsPsych.data.get().filter({phase: 'experiment'}).values();
      
      // 条件ごとにデータを集計
      const summary = {};
      const payload_data = []; // GASに送信するデータを抽出
      
      all_data.forEach(d => {
        const key = `A${d.angle}_F${d.feather_length}`;
        if (!summary[key]) {
          summary[key] = {
            angle: d.angle,
            feather_length: d.feather_length,
            errors: [],
            adjusted_lengths: []
          };
        }
        summary[key].errors.push(d.illusion_error);
        summary[key].adjusted_lengths.push(d.adjusted_length);

        // 指定されたデータ構造に整形
        payload_data.push({
          subject_id: d.subject_id,
          timestamp: d.timestamp,
          angle: d.angle,
          wing_length: d.wing_length,
          pse: d.pse,
          error_amount: d.error_amount
        });
      });

      // 平均値を計算してHTMLテーブルの行を作成
      let tableRows = '';
      for (let key in summary) {
        const item = summary[key];
        const avg_adj = (item.adjusted_lengths.reduce((a, b) => a + b, 0) / item.adjusted_lengths.length).toFixed(1);
        const avg_err = (item.errors.reduce((a, b) => a + b, 0) / item.errors.length).toFixed(1);
        
        tableRows += `
          <tr>
            <td>${item.angle} 度</td>
            <td>${item.feather_length} px</td>
            <td>200 px</td>
            <td><strong>${avg_adj} px</strong></td>
            <td><strong>${avg_err > 0 ? '+' + avg_err : avg_err} px</strong></td>
          </tr>
        `;
      }

      // 結果表示用のHTML
      const resultsHtml = `
        <div class="experiment-container" style="max-width: 800px; text-align: left;">
          <h1 style="text-align: center;">実験が終了しました！</h1>
          
          <!-- 自動送信ステータスインジケータ -->
          <div id="upload-status"></div>

          <p class="center-text" style="font-size: 15px;">
            ご協力ありがとうございました。測定された調整結果の平均値は以下の通りです。<br>
            （比較刺激は外向き羽（＜ーーー＞）のため、錯視により通常は「実際より短く」見えます。そのため、標準刺激（200px）と同じに見えるように調整した結果、調整後の長さが200pxより大きくなる傾向があります。）
          </p>
          
          <table class="results-table">
            <thead>
              <tr>
                <th>羽の角度</th>
                <th>羽の長さ</th>
                <th>標準刺激の長さ</th>
                <th>調整された平均長さ</th>
                <th>平均誤差（錯視量）</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>

          <div style="text-align: center; margin-top: 30px;">
            <p class="center-text" style="font-size: 14px; color: #666;">
              ※生データを保存、送信する場合は、以下のボタンでCSV形式などでも出力できます。
            </p>
            <button class="jspsych-btn" id="download-btn">データをダウンロード(CSV)</button>
          </div>
        </div>
      `;

      // 画面に埋め込む
      document.getElementById('jspsych-target').innerHTML = resultsHtml;

      // 自動データ送信を即座に開始
      sendDataToGAS(payload_data);

      // ダウンロードボタンのクリックイベントを設定
      document.getElementById('download-btn').addEventListener('click', function() {
        jsPsych.data.get().filter({phase: 'experiment'}).localSave('csv', `muller_lyer_${subject_id}.csv`);
      });
    }

    // 実験の実行
    jsPsych.run(timeline);
  </script>
</body>
</html>
