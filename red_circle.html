<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jsPsych Red Circle Experiment</title>
    <!-- jsPsych 7.x CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        /* 背景色を灰色に設定 */
        body, .jspsych-content-wrapper {
            background-color: #808080 !important;
            color: white; /* テキストを読みやすくするため */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 赤い円のスタイル定義 */
        .red-circle {
            width: 100px;
            height: 100px;
            background-color: #ff0000;
            border-radius: 50%;
            margin: 0 auto;
        }

        /* メッセージ用のスタイル */
        .message {
            font-family: sans-serif;
            font-size: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        /**
         * jsPsychの初期化
         */
        const jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // 実験終了時にデータを確認したい場合はここに追加
            }
        });

        // タイムラインの作成
        const timeline = [];

        /**
         * 1. 赤い円を表示する試行
         * html-keyboard-response を使用
         */
        const circle_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="red-circle"></div>',
            choices: [' '], // スペースキーのみ受け付ける
            prompt: '<p style="margin-top: 20px;">スペースキーを押すと終了します</p>',
            data: { task: 'circle_display' }
        };
        timeline.push(circle_trial);

        /**
         * 2. 終了メッセージの表示
         */
        const end_message = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="message">
                    <p>実験が終了しました。</p>
                    <p>ご協力ありがとうございました。</p>
                </div>
            `,
            choices: "NO_KEYS", // キー入力を受け付けず、一定時間で終わらせるか表示し続ける
            duration: 3000      // 3秒間表示して終了
        };
        timeline.push(end_message);

        // 実験の開始
        jsPsych.run(timeline);
    </script>
</body>
</html>
